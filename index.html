<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>Southern Sayings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      padding-bottom: 5rem;
    }

    h1 {
      color: #e0e0e0;
      font-size: 1.3rem;
      text-align: center;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Category Chips */
    .categories {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.4rem;
      padding: 0 0.8rem;
      margin-bottom: 1.2rem;
      max-width: 420px;
    }

    .cat-chip {
      background: #2a2a4a;
      color: #aaa;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .cat-chip.active {
      background: #cc0000;
      color: #fff;
      border-color: #ff4444;
    }

    /* Button */
    .button-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .button-shadow {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #8b0000;
      box-shadow: 0 8px 0 #5c0000, 0 12px 20px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    .big-red-button {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 35% 35%, #ff4444, #cc0000 50%, #990000);
      box-shadow:
        inset 0 -8px 15px rgba(0,0,0,0.3),
        inset 0 8px 15px rgba(255,255,255,0.15),
        0 0 30px rgba(255,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      z-index: 2;
      animation: pulse-glow 2s infinite;
    }

    .big-red-button:active {
      transform: translateX(-50%) translateY(6px);
      box-shadow:
        inset 0 -4px 10px rgba(0,0,0,0.3),
        inset 0 4px 10px rgba(255,255,255,0.1),
        0 0 15px rgba(255,0,0,0.2);
    }

    .button-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      z-index: 3;
    }

    /* Saying */
    .saying-box {
      width: 90%;
      max-width: 400px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.5rem;
      text-align: center;
    }

    .saying-text {
      color: #f5deb3;
      font-size: 1.2rem;
      line-height: 1.6;
      font-style: italic;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s, transform 0.4s;
    }

    .saying-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    .category-label {
      color: #666;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.5rem;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .category-label.show { opacity: 1; }

    /* Voice Picker */
    .voice-picker {
      position: fixed;
      bottom: 0.8rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #1a1a2e;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
    }

    .voice-picker label {
      color: #888;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .voice-picker select {
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      font-size: 0.8rem;
      max-width: 180px;
    }

    .voice-test {
      background: #2a2a4a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      font-size: 0.7rem;
      cursor: pointer;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: inset 0 -8px 15px rgba(0,0,0,0.3), inset 0 8px 15px rgba(255,255,255,0.15), 0 0 30px rgba(255,0,0,0.3); }
      50% { box-shadow: inset 0 -8px 15px rgba(0,0,0,0.3), inset 0 8px 15px rgba(255,255,255,0.15), 0 0 50px rgba(255,0,0,0.5); }
    }
  </style>
</head>
<body>

    <div class="button-shadow"></div>
    <div class="button-label">PUSH IT</div>
  </div>

    <p class="saying-text" id="sayingText"></p>
  </div>
  <div class="category-label" id="catLabel"></div>

  <div class="voice-picker">
    <label for="voiceSelect">Voice:</label>
    <select id="voiceSelect"></select>
    <button class="voice-test" id="testVoice">Test</button>

    const categories = Object.keys(allSayings);
    let activeCategory = localStorage.getItem('southernCat') || 'all';
    let lastIndex = -1;

    const catContainer = document.getElementById('categories');
    const button = document.getElementById('theButton');
    const text = document.getElementById('sayingText');
    const catLabel = document.getElementById('catLabel');
    const voiceSelect = document.getElementById('voiceSelect');
    const testBtn = document.getElementById('testVoice');

    // Build category chips
    function buildChips() {
      catContainer.innerHTML = '';
      // "All" chip
      const allChip = document.createElement('button');
      allChip.className = 'cat-chip' + (activeCategory === 'all' ? ' active' : '');
      allChip.textContent = 'All';
      allChip.addEventListener('click', () => setCategory('all'));
      catContainer.appendChild(allChip);

      categories.forEach(cat => {
        const chip = document.createElement('button');
        chip.className = 'cat-chip' + (activeCategory === cat ? ' active' : '');
        chip.textContent = cat;
        chip.addEventListener('click', () => setCategory(cat));
        catContainer.appendChild(chip);
      });
    }

    function setCategory(cat) {
      activeCategory = cat;
      localStorage.setItem('southernCat', cat);
      buildChips();
    }

    // Voice - show all unique English voices (fixes Android showing duplicates)
    function loadVoices() {
      const voices = window.speechSynthesis.getVoices();
      if (!voices.length) return;
      voiceSelect.innerHTML = '';

      // Grab every English voice - normalize lang with both - and _
      const english = voices.filter(v => {
        const lang = v.lang.replace('_', '-').toLowerCase();
        return lang.startsWith('en');
      });

      // If nothing matched, show ALL voices as fallback
      const pool = english.length ? english : voices;

      // Deduplicate by voice name so Android doesn't show the same voice 3 times
      const seen = new Set();
      const unique = [];
      pool.forEach(v => {
        const key = v.name.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(v);
        }
      });

      const labels = {
        'en-us': 'American', 'en-gb': 'British', 'en-au': 'Australian',
        'en-in': 'Indian', 'en-za': 'South African', 'en-ie': 'Irish',
        'en-nz': 'New Zealand', 'en-sg': 'Singapore'
      };

      unique.forEach(v => {
        const opt = document.createElement('option');
        opt.value = voices.indexOf(v);
        const langKey = v.lang.replace('_', '-').toLowerCase();
        const accent = labels[langKey] || 'English';
        // Clean up Android voice names (remove "en-us-x-" prefixes etc)
        let name = v.name;
        if (name.match(/^[a-z]{2}-[a-z]{2}-/i)) {
          name = name.replace(/^[a-z]{2}-[a-z]{2}-x?-?/i, '').trim();
        }
        opt.textContent = (name || v.name) + ' — ' + accent;
        voiceSelect.appendChild(opt);
      });

      const saved = localStorage.getItem('southernVoice');
      if (saved && voiceSelect.querySelector('[value="' + saved + '"]')) {
        voiceSelect.value = saved;
      }
    }

    voiceSelect.addEventListener('change', () => {
      localStorage.setItem('southernVoice', voiceSelect.value);
    });

    function speakText(msg) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(msg);
      utter.rate = 0.85;
      utter.pitch = 0.9;
      const voices = window.speechSynthesis.getVoices();
      const chosen = voices[parseInt(voiceSelect.value)];
      if (chosen) utter.voice = chosen;
      window.speechSynthesis.speak(utter);
    }

    testBtn.addEventListener('click', () => {
      speakText("Well butter my butt and call me a biscuit!");
    });

    // Main button
    function showSaying() {
      let pool;
      if (activeCategory === 'all') {
        pool = categories.flatMap(c => allSayings[c].map(s => ({ text: s, cat: c })));
      } else {
        pool = allSayings[activeCategory].map(s => ({ text: s, cat: activeCategory }));
      }

      let idx;
      do {
        idx = Math.floor(Math.random() * pool.length);
      } while (idx === lastIndex && pool.length > 1);
      lastIndex = idx;

      text.classList.remove('show');
      catLabel.classList.remove('show');

      setTimeout(() => {
        text.textContent = pool[idx].text;
        text.classList.add('show');
        catLabel.textContent = pool[idx].cat;
        catLabel.classList.add('show');
        speakText(pool[idx].text);
      }, 150);
    }

    button.addEventListener('click', showSaying);
    button.addEventListener('touchend', (e) => {
      e.preventDefault();
      showSaying();
    });

    // Init
    buildChips();
    if ('speechSynthesis' in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
